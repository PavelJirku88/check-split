<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Split</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f0e8;
  min-height: 100vh;
  font-family: Georgia, 'Times New Roman', serif;
  color: #1a1612;
  padding: 24px 16px 60px;
}
.wrap { max-width: 920px; margin: 0 auto; }

/* Header */
header {
text-align: center;
margin-bottom: 24px;
padding: 30px 24px 18px;
background: #faf7f2;
border-top: 4px solid #1a1612;
box-shadow: 0 2px 12px rgba(0,0,0,.10);
}
header::after {
content: ‘’;
display: block;
height: 2px;
margin-top: 18px;
background: repeating-linear-gradient(90deg,#1a1612 0 8px,transparent 8px 16px);
}
h1 { font-size: 2.8rem; line-height: 1; }
.sub { margin-top: 6px; font-size: .78rem; color: #6b5e52; letter-spacing: .14em; text-transform: uppercase; font-family: Arial, sans-serif; }

/* Settings */
.settings {
background: #faf7f2;
box-shadow: 0 2px 12px rgba(0,0,0,.10);
padding: 20px 24px 16px;
margin-bottom: 24px;
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 16px;
align-items: start;
}
.field label { display: block; font-size: .67rem; font-weight: bold; text-transform: uppercase; letter-spacing: .1em; color: #6b5e52; margin-bottom: 5px; font-family: Arial, sans-serif; }
.field input, .field select {
width: 100%; padding: 8px 10px;
border: 1.5px solid #c0b8b0;
background: #f5f0e8;
font-family: Arial, sans-serif;
font-size: 1rem; color: #1a1612;
}
.field input:focus, .field select:focus { outline: 2px solid #c4622d; }
#f-bill { border-color: #c4622d; background: #fff9f6; font-weight: bold; }
#tip-badge { display: block; min-height: 1em; margin-top: 4px; font-size: .7rem; font-weight: bold; color: #2d7a4f; font-family: Arial, sans-serif; }
#tip-badge.warn { color: #c4622d; }

/* Grid */
#grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
gap: 20px;
margin-bottom: 24px;
}

/* Card */
.card { background: #faf7f2; box-shadow: 0 2px 12px rgba(0,0,0,.10); }
.card-head { background: #1a1612; color: #faf7f2; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.card-num { font-size: 1rem; opacity: .4; flex-shrink: 0; }
.name-in {
flex: 1; background: transparent; border: none;
border-bottom: 1px solid rgba(255,255,255,.3);
color: #faf7f2; font-family: Arial, sans-serif;
font-size: .92rem; padding: 2px 0; outline: none; min-width: 0;
}
.name-in:focus { border-bottom-color: rgba(255,255,255,.8); }

.card-items { padding: 12px 14px 8px; font-family: Arial, sans-serif; }
.irow { display: grid; grid-template-columns: 1fr 70px 24px; gap: 6px; align-items: center; margin-bottom: 5px; }
.ilbl, .ipri {
border: none; border-bottom: 1px solid #d0c8c0;
background: transparent; font-family: Arial, sans-serif;
font-size: .85rem; color: #1a1612;
padding: 4px 0; outline: none; width: 100%;
}
.ipri { text-align: right; }
.ilbl:focus, .ipri:focus { border-bottom-color: #c4622d; }
.ilbl::placeholder, .ipri::placeholder { color: #bbb4ac; }
.rmbtn { background: none; border: none; cursor: pointer; color: #c0b8b0; font-size: 1.1rem; padding: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.rmbtn:hover { color: #c4622d; }
.addbtn {
width: 100%; padding: 7px; margin-top: 8px;
background: none; border: 1.5px dashed #c0b8b0;
color: #6b5e52; font-family: Arial, sans-serif;
font-size: .72rem; font-weight: bold; letter-spacing: .06em;
cursor: pointer; text-transform: uppercase;
}
.addbtn:hover { border-color: #c4622d; color: #c4622d; }

.card-tots { border-top: 1px dashed #d0c8c0; padding: 10px 14px 14px; font-family: Arial, sans-serif; font-size: .82rem; }
.tr { display: flex; justify-content: space-between; padding: 2px 0; color: #6b5e52; }
.tr.final { border-top: 1.5px solid #1a1612; margin-top: 6px; padding-top: 6px; font-size: .95rem; font-weight: bold; color: #1a1612; }
.tr.cvt { color: #2d7a4f; font-weight: bold; }

/* Summary */
.summary { background: #1a1612; color: #faf7f2; padding: 26px; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
.summary h2 { font-size: 1.3rem; margin-bottom: 18px; opacity: .9; }
.sgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(125px, 1fr)); gap: 12px; margin-bottom: 22px; }
.sc { padding: 12px 14px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.07); }
.sc.ac { background: #c4622d; border-color: #c4622d; }
.sc.gr { background: #2d7a4f; border-color: #2d7a4f; }
.sc-lbl { font-family: Arial, sans-serif; font-size: .62rem; font-weight: bold; text-transform: uppercase; letter-spacing: .1em; opacity: .55; margin-bottom: 5px; }
.sc-val { font-size: 1.2rem; font-weight: bold; }
.pplist { display: flex; flex-direction: column; gap: 6px; }
.pprow { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,.05); padding: 9px 14px; font-family: Arial, sans-serif; font-size: .88rem; }
.ppname { font-weight: bold; opacity: .9; }
.ppamt { display: flex; gap: 12px; align-items: center; }
.pptot { font-weight: bold; }
.ppcvt { opacity: .5; font-size: .78rem; }
.resetbtn { display: block; margin: 18px auto 0; padding: 8px 24px; background: none; border: 1.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.5); font-family: Arial, sans-serif; font-size: .72rem; font-weight: bold; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; }
.resetbtn:hover { border-color: rgba(255,255,255,.6); color: rgba(255,255,255,.9); }

/* Error box */
#errmsg { display:none; background:#c00; color:#fff; padding:12px 16px; margin-bottom:16px; font-family:monospace; font-size:.85rem; white-space:pre-wrap; }
</style>

</head>
<body>
<div class="wrap">

  <div id="errmsg"></div>

  <header>
    <h1>Check Split</h1>
  </header>

  <div class="settings">
    <div class="field">
      <label>Total Bill</label>
      <input id="f-bill" type="text" inputmode="decimal" placeholder="0.00" autocomplete="off">
      <span id="tip-badge"></span>
    </div>
    <div class="field">
      <label>Number of People</label>
      <select id="f-n">
        <option value="2">2 people</option>
        <option value="3">3 people</option>
        <option value="4" selected>4 people</option>
        <option value="5">5 people</option>
        <option value="6">6 people</option>
        <option value="7">7 people</option>
        <option value="8">8 people</option>
      </select>
    </div>
    <div class="field">
      <label>Currency</label>
      <input id="f-cur" type="text" value="EUR" autocomplete="off">
    </div>
    <div class="field">
      <label>Conversion Rate</label>
      <input id="f-rate" type="text" inputmode="decimal" value="1" autocomplete="off">
    </div>
    <div class="field">
      <label>Converted To</label>
      <input id="f-ccur" type="text" value="" autocomplete="off">
    </div>
  </div>

  <div id="grid"></div>

  <div class="summary">
    <h2>Bill Summary</h2>
    <div class="sgrid">
      <div class="sc">   <div class="sc-lbl">Items Total</div>      <div class="sc-val" id="s-sub">—</div></div>
      <div class="sc">   <div class="sc-lbl">Tip (equal split)</div> <div class="sc-val" id="s-tip">—</div></div>
      <div class="sc ac"><div class="sc-lbl">Grand Total</div>       <div class="sc-val" id="s-grand">—</div></div>
      <div class="sc gr" id="s-cc"><div class="sc-lbl">In <span id="s-cc-lbl"></span></div><div class="sc-val" id="s-cc-val">—</div></div>
    </div>
    <div class="pplist" id="pplist"></div>
    <button class="resetbtn" id="resetbtn">&#8635; Reset All</button>
  </div>

</div>

<script>
// catch any error and show it visibly
window.onerror = function(msg, src, line, col, err) {
  var box = document.getElementById('errmsg');
  box.style.display = 'block';
  box.textContent = 'JS ERROR: ' + msg + '\n(line ' + line + ')';
  return false;
};

// ── state ──────────────────────────────────────────────────────────────
var N      = 4;
var people = [];

// ── helpers ────────────────────────────────────────────────────────────
function gid(id) { return document.getElementById(id); }

function parseN(s) {
  var clean = String(s === undefined || s === null ? '' : s).replace(/\s/g, '').replace(',', '.');
  var v = parseFloat(clean);
  return isNaN(v) ? 0 : v;
}

function fmtN(n, d) {
  if (d === undefined) d = 2;
  var v = isNaN(n) ? 0 : n;
  return v.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function escH(s) {
  return String(s === undefined || s === null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getCur()  { return gid('f-cur').value  || 'EUR'; }
function getRate() { var v = parseN(gid('f-rate').value); return v > 0 ? v : 1; }
function getCCur() { return gid('f-ccur').value || ''; }
function getBill() { return parseN(gid('f-bill').value); }

// ── people ─────────────────────────────────────────────────────────────
function makePerson(i) {
  return { name: '', items: [{ label: '', price: '' }] };
}

function syncPeople() {
  while (people.length < N) { people.push(makePerson(people.length)); }
  while (people.length > N) { people.pop(); }
}

// ── render grid ────────────────────────────────────────────────────────
function renderGrid() {
  syncPeople();
  var grid = gid('grid');
  grid.innerHTML = '';
  for (var i = 0; i < N; i++) {
    grid.appendChild(makeCard(i));
  }
}

function makeCard(pi) {
  var p    = people[pi];
  var card = document.createElement('div');
  card.className = 'card';

  // --- header ---
  var head  = document.createElement('div');
  head.className = 'card-head';

  var numSpan = document.createElement('span');
  numSpan.className = 'card-num';
  numSpan.textContent = '#' + (pi + 1);

  var nameIn = document.createElement('input');
  nameIn.type        = 'text';
  nameIn.className   = 'name-in';
  nameIn.placeholder = 'Name';
  nameIn.value       = p.name;

  head.appendChild(numSpan);
  head.appendChild(nameIn);
  card.appendChild(head);

  // store pi on the name input
  nameIn._pi = pi;
  nameIn.onchange = function() {
    people[this._pi].name = this.value;
    refreshSummaryRows();
    doSave();
  };

  // --- items ---
  var ilist = document.createElement('div');
  ilist.className = 'card-items';
  ilist.id = 'ilist-' + pi;

  for (var j = 0; j < p.items.length; j++) {
    ilist.appendChild(makeRow(pi, j));
  }

  var addBtn = document.createElement('button');
  addBtn.className   = 'addbtn';
  addBtn.textContent = '+ Add item';
  addBtn._pi = pi;
  addBtn.onclick = function() { addItem(this._pi); };
  ilist.appendChild(addBtn);

  card.appendChild(ilist);

  // --- totals ---
  var tots = document.createElement('div');
  tots.className = 'card-tots';
  tots.innerHTML =
    '<div class="tr"><span>Subtotal</span><span id="csub-' + pi + '">—</span></div>' +
    '<div class="tr"><span>Tip share</span><span id="ctip-' + pi + '">—</span></div>' +
    '<div class="tr final"><span>Total</span><span id="ctot-' + pi + '">—</span></div>' +
    '<div class="tr cvt" id="ccvr-' + pi + '" style="display:none">' +
      '<span id="ccvl-' + pi + '"></span><span id="ccvv-' + pi + '">—</span>' +
    '</div>';
  card.appendChild(tots);

  return card;
}

function makeRow(pi, ii) {
  var row = document.createElement('div');
  row.className = 'irow';
  row.id = 'irow-' + pi + '-' + ii;

  var lbl = document.createElement('input');
  lbl.type        = 'text';
  lbl.className   = 'ilbl';
  lbl.placeholder = 'Item\u2026';
  lbl.value       = people[pi].items[ii].label || '';
  lbl._pi = pi; lbl._ii = ii;
  lbl.onchange = function() {
    people[this._pi].items[this._ii].label = this.value;
    doSave();
  };

  var pri = document.createElement('input');
  pri.type        = 'text';
  pri.className   = 'ipri';
  pri.placeholder = '0.00';
  pri.value       = people[pi].items[ii].price || '';
  pri.inputMode   = 'decimal';
  pri._pi = pi; pri._ii = ii;
  pri.oninput = function() {
    people[this._pi].items[this._ii].price = this.value;
    doCalc();
    doSave();
  };

  var rm = document.createElement('button');
  rm.className   = 'rmbtn';
  rm.textContent = '\u00d7';
  rm.title       = 'Remove';
  rm._pi = pi; rm._ii = ii;
  rm.onclick = function() { removeItem(this._pi, this._ii); };

  row.appendChild(lbl);
  row.appendChild(pri);
  row.appendChild(rm);
  return row;
}

// ── item operations ────────────────────────────────────────────────────
function addItem(pi) {
  var ii = people[pi].items.length;
  people[pi].items.push({ label: '', price: '' });
  var ilist  = gid('ilist-' + pi);
  var addBtn = ilist.querySelector('.addbtn');
  ilist.insertBefore(makeRow(pi, ii), addBtn);
  doCalc();
  doSave();
  var inp = gid('ilist-' + pi).querySelectorAll('.ilbl');
  if (inp.length) inp[inp.length - 1].focus();
}

function removeItem(pi, ii) {
  if (people[pi].items.length === 1) {
    people[pi].items[0] = { label: '', price: '' };
    var row = gid('irow-' + pi + '-0');
    if (row) {
      var l = row.querySelector('.ilbl');
      var p = row.querySelector('.ipri');
      if (l) l.value = '';
      if (p) p.value = '';
    }
  } else {
    people[pi].items.splice(ii, 1);
    // full re-render of just this card's items
    var ilist = gid('ilist-' + pi);
    var addBtn = ilist.querySelector('.addbtn');
    // remove all rows
    var rows = ilist.querySelectorAll('.irow');
    for (var r = 0; r < rows.length; r++) ilist.removeChild(rows[r]);
    // rebuild rows
    for (var j = 0; j < people[pi].items.length; j++) {
      ilist.insertBefore(makeRow(pi, j), addBtn);
    }
  }
  doCalc();
  doSave();
}

// ── calc ───────────────────────────────────────────────────────────────
function doCalc() {
  var c       = getCur();
  var r       = getRate();
  var cc      = getCCur();
  var bill    = getBill();
  var showCvt = cc !== '' && !(r === 1 && cc === c);

  // subtotals — read directly from price inputs' _value via people state
  // (people[pi].items[ii].price is kept in sync via oninput)
  var subs = [];
  for (var pi = 0; pi < N; pi++) {
    var s = 0;
    for (var ii = 0; ii < people[pi].items.length; ii++) {
      s += parseN(people[pi].items[ii].price);
    }
    subs.push(s);
  }

  var grandSub = 0;
  for (var x = 0; x < subs.length; x++) grandSub += subs[x];

  var tip   = bill > 0 ? Math.max(0, bill - grandSub) : 0;
  var tipPP = N > 0 ? tip / N : 0;
  var grand = grandSub + tip;

  // tip badge
  var badge = gid('tip-badge');
  if (badge) {
    if (bill > 0) {
      var diff = bill - grandSub;
      if (diff >= 0) {
        badge.textContent = 'Tip: ' + c + fmtN(tip) + '  (' + fmtN(grandSub > 0 ? tip / grandSub * 100 : 0) + '%)';
        badge.className = '';
      } else {
        badge.textContent = '\u26a0 Items exceed total by ' + c + fmtN(-diff);
        badge.className = 'warn';
      }
    } else {
      badge.textContent = '';
      badge.className = '';
    }
  }

  // per-card
  for (var i = 0; i < N; i++) {
    var tot  = subs[i] + tipPP;
    var conv = tot * r;
    setTxt('csub-' + i, c + fmtN(subs[i]));
    setTxt('ctip-' + i, c + fmtN(tipPP));
    setTxt('ctot-' + i, c + fmtN(tot));
    setTxt('ccvv-' + i, fmtN(conv, 0) + '\u00a0' + cc);
    setTxt('ccvl-' + i, cc);
    var cvr = gid('ccvr-' + i);
    if (cvr) cvr.style.display = showCvt ? '' : 'none';
  }

  // summary
  setTxt('s-sub',    c + fmtN(grandSub));
  setTxt('s-tip',    c + fmtN(tip));
  setTxt('s-grand',  c + fmtN(grand));
  setTxt('s-cc-lbl', cc);
  setTxt('s-cc-val', fmtN(grand * r, 0) + '\u00a0' + cc);
  var scc = gid('s-cc');
  if (scc) scc.style.display = showCvt ? '' : 'none';

  refreshSummaryRows(subs, tipPP);
}

function refreshSummaryRows(subs, tipPP) {
  // can be called standalone from name change — recalc subs if not passed
  if (!subs) {
    subs = [];
    for (var pi = 0; pi < N; pi++) {
      var s = 0;
      for (var ii = 0; ii < people[pi].items.length; ii++) s += parseN(people[pi].items[ii].price);
      subs.push(s);
    }
    var bill = getBill();
    var grandSub = 0;
    for (var x = 0; x < subs.length; x++) grandSub += subs[x];
    var tip = bill > 0 ? Math.max(0, bill - grandSub) : 0;
    tipPP = N > 0 ? tip / N : 0;
  }

  var c = getCur(), r = getRate(), cc = getCCur();
  var showCvt = !(r === 1 && cc === c);
  var pplist = gid('pplist');
  if (!pplist) return;
  var html = '';
  for (var j = 0; j < N; j++) {
    var tot  = subs[j] + tipPP;
    var conv = tot * r;
    html += '<div class="pprow">' +
      '<span class="ppname">' + escH(people[j].name || 'Person ' + (j + 1)) + '</span>' +
      '<span class="ppamt">' +
        (showCvt ? '<span class="ppcvt">' + fmtN(conv, 0) + '\u00a0' + cc + '</span>' : '') +
        '<span class="pptot">' + c + fmtN(tot) + '</span>' +
      '</span></div>';
  }
  pplist.innerHTML = html;
}

function setTxt(id, txt) { var e = gid(id); if (e) e.textContent = txt; }

// ── save / load ────────────────────────────────────────────────────────
function doSave() {
  try {
    sessionStorage.setItem('cs6', JSON.stringify({
      v: 6, N: N, people: people,
      bill: gid('f-bill').value,
      cur:  gid('f-cur').value,
      rate: gid('f-rate').value,
      ccur: gid('f-ccur').value
    }));
  } catch(e) {}
}

function doLoad() {
  try {
    var raw = sessionStorage.getItem('cs6');
    if (!raw) return null;
    var d = JSON.parse(raw);
    if (!d || d.v !== 6) return null;
    return d;
  } catch(e) { return null; }
}

// ── reset ──────────────────────────────────────────────────────────────
function doReset() {
  N = parseInt(gid('f-n').value, 10) || 4;
  people = [];
  gid('f-bill').value = '';
  syncPeople();
  renderGrid();
  doCalc();
  doSave();
}

// ── init ───────────────────────────────────────────────────────────────
var saved = doLoad();
if (saved && saved.people && saved.people.length) {
  N      = saved.N || 4;
  people = saved.people;
  gid('f-n').value    = N;
  gid('f-bill').value = saved.bill  || '';
  gid('f-cur').value  = saved.cur   || 'EUR';
  gid('f-rate').value = saved.rate  || '1';
  gid('f-ccur').value = saved.ccur  || '';
} else {
  N      = 4;
  people = [];
}

syncPeople();
renderGrid();
doCalc();

// ── global event listeners ─────────────────────────────────────────────
gid('f-n').addEventListener('change', function() {
  N = parseInt(this.value, 10) || 4;
  syncPeople();
  renderGrid();
  doCalc();
  doSave();
});

gid('f-bill').addEventListener('input', function() { doCalc(); doSave(); });
gid('f-cur').addEventListener('input',  function() { doCalc(); doSave(); });
gid('f-rate').addEventListener('input', function() { doCalc(); doSave(); });
gid('f-ccur').addEventListener('input', function() { doCalc(); doSave(); });
gid('resetbtn').addEventListener('click', doReset);
</script>

</body>
</html>
